services:
  - type: web
    name: civic_monitoring-2
    env: python
    plan: free
    buildCommand: bash render-build.sh
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker --chdir backend main:app
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: civic_monitoring-2-db
          property: connectionString

databases:
  - name: civic_monitoring-2-db
    plan: free
